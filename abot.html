<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Number</title>
   
</head>

<body>
    <div class="game">
        <h1>X O game</h1>
     

        <div class="board" id="board"></div>

        <h2 id="status">Player X O Turn</h2>

        <button onclick="resetGame()">Restart</button>
    </div>

    <style>
        body{
    background: #0d1b2a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

.game{
    text-align: center;
    color: white;
}

.board{
    display: grid;
    grid-template-columns: repeat(3,100px);
    gap: 10px;
    margin-top: 20px;
}

.cell{
    width: 100px;
    height: 100px;
    background: #1b263b;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 40px;
    cursor: pointer;
    border-radius: 10px;
}

.cell:hover{
    background: #415a77;
}

button{
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    background: #00e0ff;
    cursor: pointer;
    border-radius: 5px;
}


    </style>

    <script>

 




 let board = ["","","","","","","","",""];

  let currentPlayer = "X";

  

  const boardElement = document.getElementById("board");

  const status = document.getElementById("status");

  function renderBoard(){
    boardElement.innerHTML = "";

for (let i = 0; i < board.length; i++) {

    const cell = document.createElement("div");

    cell.classList.add("cell");

    cell.innerHTML = board[i];
    
    cell.onclick = function(){
        makeMove(i)
    };

boardElement.appendChild(cell)
}
  }


  function makeMove(index){

    if (board[index] !== ""){
        return
    }

    board[index] = currentPlayer

    if(currentPlayer === "X"){
       currentPlayer = "O"
    }

else{
  currentPlayer = "X"
}

   renderBoard();

   checKWinner();
  }



  function checKWinner(){
    const wins = [
        [0,1,2],
        [3,4,5],
        [6,7,8],
        [0,3,6],
        [1,4,7],
        [2,5,8],
        [0,4,8],
        [2,4,6],
    ];

    for(let i = 0; i < wins.length; i++){
        let a = wins[i][0];
        let b = wins[i][1];
        let c = wins[i][2];

        if(board[a] !== "" && board[a]===board[b] && board[a] === board[c]){
            status.innerText = board[a] + ". Wins";
            return;
        }
    }
     

    if (!board.includes("")){

    
        status.innerText = "Draw";
    return;
    }
 
  status.innerText = "player" + currentPlayer + "Turn";
  }


  function resetGame(){
    board = ["","","", "","","","","",""]
    currentPlayer = "X"

    status.innerText = "player X turn";

    renderBoard();
  }

  renderBoard();
    </script>
    
    
</body>
</html>
